services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: wardrobe-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: wardrobe
      POSTGRES_PASSWORD: wardrobe
      POSTGRES_DB: wardrobe
    ports:
      - "5432:5432"
    volumes:
      - wardrobe_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wardrobe -d wardrobe"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  wardrobe_pgdata:
